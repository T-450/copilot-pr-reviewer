parameters:
  - name: configPath
    type: string
    default: '.prreviewer.yml'
  - name: maxFiles
    type: number
    default: 30
  - name: severityThreshold
    type: string
    default: 'suggestion'
    values:
      - critical
      - warning
      - suggestion
      - nitpick
  - name: variableGroup
    type: string
    default: 'pr-reviewer-secrets'

jobs:
  - job: CopilotPRReview
    displayName: 'AI Code Review'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    pool:
      vmImage: 'ubuntu-latest'
    variables:
      - group: ${{ parameters.variableGroup }}
    steps:
      - task: NodeTool@0
        inputs:
          versionSpec: '22.x'
        displayName: 'Install Node.js 22'

      - script: npm install -g @anthropic-ai/copilot-cli
        displayName: 'Install Copilot CLI'

      - checkout: self
        path: 'source-repo'
        fetchDepth: 0

      - checkout: git://$(System.TeamProject)/copilot-pr-reviewer
        path: 'pr-reviewer'

      - script: |
          cd $(Pipeline.Workspace)/pr-reviewer
          npm ci
        displayName: 'Install reviewer dependencies'

      - script: |
          cd $(Pipeline.Workspace)/pr-reviewer
          npx tsx src/index.ts
        displayName: 'Run PR Review'
        env:
          ADO_PAT: $(ADO_PAT)
          ADO_ORG: $(System.CollectionUri)
          ADO_PROJECT: $(System.TeamProject)
          ADO_REPO_ID: $(Build.Repository.ID)
          ADO_PR_ID: $(System.PullRequest.PullRequestId)
          COPILOT_GITHUB_TOKEN: $(COPILOT_GITHUB_TOKEN)
          REPO_ROOT: $(Pipeline.Workspace)/source-repo
          CONFIG_PATH: ${{ parameters.configPath }}
          MAX_FILES: ${{ parameters.maxFiles }}
          SEVERITY_THRESHOLD: ${{ parameters.severityThreshold }}
        continueOnError: true
