parameters:
  - name: configPath
    type: string
    default: '.prreviewer.yml'
  - name: model
    type: string
    default: 'gpt-4.1'
  - name: maxFiles
    type: number
    default: 30

steps:
  - task: UseNode@1
    displayName: 'Install Bun'
    inputs:
      version: '20.x'

  - script: |
      curl -fsSL https://bun.sh/install | bash
      echo "##vso[task.prependpath]$HOME/.bun/bin"
    displayName: 'Install Bun runtime'

  - script: |
      cd $(Build.SourcesDirectory)
      bun install --frozen-lockfile
    displayName: 'Install dependencies'

  - script: |
      cd $(Build.SourcesDirectory)
      bun run src/index.ts
    displayName: 'Run Copilot PR Review'
    env:
      COPILOT_GITHUB_TOKEN: $(COPILOT_GITHUB_TOKEN)
      ADO_PAT: $(System.AccessToken)
      ADO_ORG: $(System.CollectionUri)
      ADO_PROJECT: $(System.TeamProject)
      ADO_REPO_ID: $(Build.Repository.ID)
      ADO_PR_ID: $(System.PullRequest.PullRequestId)
      REPO_ROOT: $(Build.SourcesDirectory)
      CONFIG_PATH: ${{ parameters.configPath }}
      COPILOT_MODEL: ${{ parameters.model }}
    continueOnError: true
